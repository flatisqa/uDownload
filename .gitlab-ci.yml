# ============================================================================
# GitLab CI/CD Pipeline для uDowload
# Собирает Electron приложение для Linux, Windows и macOS
# ============================================================================

# ----------------------------------------------------------------------------
# СТАДИИ PIPELINE (Stages)
# Каждая стадия выполняется последовательно:
# 1. Сначала все jobs из stage: build
# 2. Затем все jobs из stage: package
# ----------------------------------------------------------------------------
stages:
  - install
  - build
  - package

# ----------------------------------------------------------------------------
# ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
# Доступны во всех jobs
# ----------------------------------------------------------------------------
variables:
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  NODE_VERSION: "20"

# ----------------------------------------------------------------------------
# ШАБЛОН КЭШИРОВАНИЯ (Cache Template)
# Используется в нескольких jobs через <<: *npm_cache
# ----------------------------------------------------------------------------
.npm_cache: &npm_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
      - node_modules/
    policy: pull

# ----------------------------------------------------------------------------
# СБОРКА ДЛЯ LINUX
# Автоматически запускается при push
# ----------------------------------------------------------------------------
build:linux:
  stage: build
  image: node:$NODE_VERSION
  <<: *npm_cache
  before_script:
    - apt-get update
    - apt-get install -y fakeroot dpkg
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build:linux
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.deb
    expire_in: 1 week

# ----------------------------------------------------------------------------
# СБОРКА ДЛЯ WINDOWS
# Только ручной запуск (when: manual)
# Требует специального Windows runner (обычно платный)
# ----------------------------------------------------------------------------
build:windows:
  stage: build
  image: electronuserland/builder:wine
  <<: *npm_cache
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build:win
  artifacts:
    paths:
      - dist/*.exe
      - dist/*.msi
      - dist/*.zip
    expire_in: 1 week
  when: manual

# ----------------------------------------------------------------------------
# СБОРКА ДЛЯ MACOS
# Только ручной запуск
# Требует macOS runner (обычно платный)
# ----------------------------------------------------------------------------
build:macos:
  stage: build
  image: node:$NODE_VERSION
  <<: *npm_cache
  script:
    - npm ci --cache .npm --prefer-offline
    - npm run build:mac
  artifacts:
    paths:
      - dist/*.dmg
      - dist/*.zip
    expire_in: 1 week
  tags:
    - saas-macos-large-m2pro
  when: manual

# ----------------------------------------------------------------------------
# СОЗДАНИЕ РЕЛИЗА (GitLab Release)
# Автоматически при создании тега (git tag v1.0.0 && git push origin v1.0.0)
# Собирает артефакты со всех jobs и создаёт релиз
# ----------------------------------------------------------------------------
create_release:
  stage: package
  image: alpine:latest
  dependencies:
    - build:linux
    - build:windows
    - build:macos
  script:
    - apk add --no-cache curl jq
    - |
      # Collect all artifacts and create release
      ASSETS=$(find dist -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" -o -name "*.zip" \) | jq -R -s -c 'split("\n")[:-1]')
      curl --request POST --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
        --header "Content-Type: application/json" \
        --data "{\"name\": \"uDowload v${CI_COMMIT_TAG}\", \"tag_name\": \"${CI_COMMIT_TAG}\", \"assets\": {\"links\": $ASSETS}}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"
  only:
    - tags
  when: manual
