# ============================================================================
# GitHub Actions Workflow для uDowload
# Автоматически собирает приложение для Linux, Windows и macOS
# ============================================================================

name: Build uDowload

# ----------------------------------------------------------------------------
# ТРИГГЕРЫ (когда запускать сборку)
# ----------------------------------------------------------------------------
on:
  # Автоматически при создании тега v1.0.0, v2.0.0 и т.д.
  push:
    tags:
      - 'v*'
  
  # При создании Pull Request в main
  pull_request:
    branches: [main]
  
  # Ручной запуск через кнопку в GitHub UI
  workflow_dispatch:

# ----------------------------------------------------------------------------
# СБОРКА ДЛЯ LINUX
# ----------------------------------------------------------------------------
jobs:
  build-linux:
    runs-on: ubuntu-latest  # Ubuntu runner от GitHub (бесплатно)
    permissions:
      contents: write  # Для загрузки артефактов
    steps:
      # Клонировать код
      - uses: actions/checkout@v4
      
      # Установить Node.js 20
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm  # Кэш npm для ускорения
      
      # Установить системные зависимости для сборки .deb пакетов
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y fakeroot dpkg
      
      # Установить npm зависимости
      - name: Install dependencies
        run: npm ci
      
      # Собрать для Linux
      - name: Build for Linux
        run: npm run build:linux
      
      # Загрузить артефакты (AppImage, deb)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.AppImage
            dist/*.deb

  # ----------------------------------------------------------------------------
  # СБОРКА ДЛЯ WINDOWS
  # ----------------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest  # Windows runner от GitHub (бесплатно)
    permissions:
      contents: write  # Для загрузки артефактов
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build for Windows
        run: npm run build:win
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.zip

  # ----------------------------------------------------------------------------
  # СБОРКА ДЛЯ MACOS
  # ----------------------------------------------------------------------------
  build-macos:
    runs-on: macos-latest  # macOS runner от GitHub (бесплатно)
    permissions:
      contents: write  # Для загрузки артефактов
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # dmg-license нужен только для создания DMG образов на macOS
      - name: Install dmg-license for macOS
        run: npm install dmg-license
      - name: Build for macOS
        run: npm run build:mac
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip

  # ============================================================================
  # СОЗДАНИЕ РЕЛИЗА (только при создании тега v*)
  # Зависит от успешной сборки всех платформ
  # ============================================================================
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Для создания релиза
    # Выполнять только если это тег вида v1.0.0
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      # Скачать все артефакты с предыдущих jobs
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # Создать GitHub Release и прикрепить файлы
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.AppImage
            artifacts/*.deb
            artifacts/*.exe
            artifacts/*.msi
            artifacts/*.dmg
            artifacts/*.zip
          draft: false      # Не черновик, сразу публикуем
          prerelease: false # Не предварительная версия
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Автоматический токен GitHub

# ----------------------------------------------------------------------------
# КАК ЭТО РАБОТАЕТ:
# ----------------------------------------------------------------------------
# 1. git tag -a v1.0.0            → Создаёт тег
#    git push origin v1.0.0        → Собирает всё + создаёт Release
# 2. Сборки доступны в:
#    - Actions → вкладка Artifacts (для разработчиков)
#    - Releases (публично, для пользователей)
# ----------------------------------------------------------------------------
